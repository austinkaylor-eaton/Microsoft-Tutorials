name: WebApi-with-Redis-SQLServer-and-HybridCache

services:
  webapi:
    image: webapi
    build:
      context: .
      dockerfile: WebApi/Dockerfile
    container_name: webapi
    
  sqlserver:
    build:
      context: .
      dockerfile: SQLServer.Dockerfile
    environment:
      - SA_PASSWORD=YourStrong!Passw0rd
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    container_name: sqlserver

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    container_name: redis